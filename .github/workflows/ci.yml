name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate dotfiles
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install --yes shellcheck lua5.4

      - name: Check Bash syntax
        run: |
          while IFS= read -r -d '' script; do
            bash -n "$script"
          done < <(find scripts -type f -name '*.sh' -print0)

      - name: Run ShellCheck
        run: shellcheck scripts/*.sh

      - name: Check Lua syntax
        run: |
          while IFS= read -r -d '' config; do
            luac -p "$config"
          done < <(find config -type f -name '*.lua' -print0)

      - name: Verify repository links and package lists
        run: |
          test -f README.md
          test -f LICENSE
          test -s packages/official.txt
          find config scripts -type l -exec test -e {} \;
